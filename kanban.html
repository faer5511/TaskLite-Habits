<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TaskLite - Kanban доска</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="kanban">
    <!-- ШАПКА САЙТА -->
    <header class="header">
        <div class="container header_container">
            <div class="header_title">TaskLite</div>

            <nav class="tabs">
                <a href="index.html" class="tab">To Do</a>
                <a href="kanban.html" class="tab active">Kanban</a>
                <a href="habits.html" class="tab">Привычки</a>
            </nav>
        </div>
    </header>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main class="container">
        <h1 class="page-title kanban-title">Доска задач</h1>

        <!-- ДОСКА KANBAN -->
        <div class="board">

            <!-- КОЛОНКА 1: TO DO -->
            <div class="column" data-status="todo">
                <div class="column_header">
                    <h2>📝 To Do</h2>
                    <span class="column_count">0</span>
                </div>
                <div class="task-list"></div>
                <button class="add-task">+ Добавить задачу</button>
            </div>

            <!-- КОЛОНКА 2: IN PROGRESS -->
            <div class="column" data-status="in-progress">
                <div class="column_header">
                    <h2>⚡ In Progress</h2>
                    <span class="column_count">0</span>
                </div>
                <div class="task-list"></div>
                <button class="add-task">+ Добавить задачу</button>
            </div>

            <!-- КОЛОНКА 3: DONE -->
            <div class="column" data-status="done">
                <div class="column_header">
                    <h2>✅ Done</h2>
                    <span class="column_count">0</span>
                </div>
                <div class="task-list"></div>
                <button class="add-task">+ Добавить задачу</button>
            </div>

        </div>

        <!-- ПОДСКАЗКА ПО DRAG & DROP -->
        <div class="kanban-hint">
            💡 Подсказка: перетаскивайте задачи зажатой левой кнопкой мыши между колонками
        </div>

    </main>

    <script src="kanban.js"></script>
</body>
</html>
